<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>项目详情 · 袁修玮</title>
  <meta name="description" content="项目详情 · 袁修玮 个人作品集。" />
  <link rel="stylesheet" href="../css/style.css?v=20260718-1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    .project-hero {
      padding: 140px 24px 60px;
      max-width: var(--max-width);
      margin: 0 auto;
    }
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted-fg);
      margin-bottom: 32px;
    }
    .breadcrumb a {
      color: var(--accent-color);
      transition: opacity 0.2s;
    }
    .breadcrumb a:hover { opacity: 0.7; }
    .breadcrumb span { color: var(--muted-fg); }
    .project-hero h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .project-hero .subtitle {
      font-size: 1.0625rem;
      color: var(--muted-fg);
      max-width: 640px;
      line-height: 1.6;
    }
    .project-body {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 24px 80px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
    }
    .project-section {
      margin-top: 38px;
    }
    .project-section:first-child {
      margin-top: 0;
    }
    .project-content h2 {
      font-size: 1.375rem;
      font-weight: 700;
      margin: 0 0 16px;
    }
    .project-content p {
      font-size: 0.9375rem;
      color: var(--muted-fg);
      line-height: 1.75;
      margin-bottom: 16px;
    }
    .project-content ul {
      list-style: none;
      padding: 0;
    }
    .project-content ul li {
      font-size: 0.9375rem;
      color: var(--muted-fg);
      line-height: 1.7;
      padding-left: 20px;
      position: relative;
      margin-bottom: 8px;
    }
    .project-content ul li::before {
      content: "";
      position: absolute;
      left: 4px;
      top: 10px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-color);
    }
    .project-metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
    }
    .project-metric {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--card-bg);
    }
    .project-metric strong {
      color: var(--accent-color);
      font-family: var(--font-mono);
      font-size: 1.45rem;
      line-height: 1.2;
      margin-bottom: 7px;
    }
    .project-metric span {
      color: var(--fg);
      font-size: 0.8125rem;
      font-weight: 600;
    }
    .project-metric small {
      color: var(--muted-fg);
      font-size: 0.71875rem;
      line-height: 1.45;
      margin-top: 5px;
    }
    .project-steps {
      list-style: none;
      padding: 0;
      counter-reset: project-step;
    }
    .project-steps li {
      counter-increment: project-step;
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 14px;
      padding: 0 0 22px;
      margin: 0;
    }
    .project-steps li::before {
      content: counter(project-step, decimal-leading-zero);
      position: static;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid hsl(var(--accent) / 0.35);
      border-radius: 50%;
      background: hsl(var(--accent) / 0.08);
      color: var(--accent-color);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
    }
    .project-steps strong {
      display: block;
      color: var(--fg);
      font-size: 0.90625rem;
      margin: 5px 0 5px;
    }
    .project-steps p {
      margin: 0;
      font-size: 0.84375rem;
    }
    .project-callout {
      border-left: 3px solid var(--accent-color);
      border-radius: 0 var(--radius) var(--radius) 0;
      background: hsl(var(--accent) / 0.07);
      padding: 18px 20px;
    }
    .project-callout strong {
      display: block;
      color: var(--accent-color);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      margin-bottom: 6px;
    }
    .project-callout p {
      margin: 0;
      color: var(--fg);
    }
    .project-related-links {
      display: grid;
      gap: 10px;
    }
    .project-related-link {
      display: flex;
      flex-direction: column;
      padding: 18px 20px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      background: var(--card-bg);
      transition: border-color 0.2s, transform 0.2s;
    }
    .project-related-link:hover {
      border-color: hsl(var(--accent) / 0.35);
      transform: translateY(-1px);
    }
    .project-related-link > span {
      color: var(--accent-color);
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      margin-bottom: 5px;
    }
    .project-related-link > strong {
      color: var(--fg);
      font-size: 0.90625rem;
    }
    .project-related-link > p {
      margin: 5px 0 0;
      font-size: 0.8125rem;
    }
    .project-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }
    .project-images figure { margin: 0; }
    .project-images img {
      width: 100%;
      height: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      display: block;
    }
    .project-images figcaption {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--muted-fg);
      margin-top: 6px;
    }
    .project-sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
    }
    .sidebar-card h3 {
      font-family: var(--font-mono);
      font-size: 0.6875rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent-color);
      margin-bottom: 12px;
    }
    .sidebar-card .tech-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .sidebar-card .tech-list span {
      font-family: var(--font-mono);
      font-size: 0.71875rem;
      color: var(--fg);
      background: hsl(var(--muted));
      border: 1px solid var(--border-color);
      padding: 3px 10px;
      border-radius: 9999px;
    }
    .sidebar-card p {
      font-size: 0.84375rem;
      color: var(--muted-fg);
      line-height: 1.55;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 0.8125rem;
      color: var(--accent-color);
      margin-top: 32px;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 0.7; }
    @media (max-width: 768px) {
      .project-body { grid-template-columns: 1fr; }
      .project-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 480px) {
      .project-metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>

</body>
</html>
