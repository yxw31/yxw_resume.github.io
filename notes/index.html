<!DOCTYPE html>

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Notes access-gate sentinel (sync). Redirects to login.html unless the
       browser already has an unexpired unlock record. To disable the gate
       entirely, set "enabled": false in data/52_notes-gate.json AND remove
       this script. ⚠ Client-side check only — not real encryption. -->
  <script>
  (function () {
    try {
      var raw = localStorage.getItem('notes-gate-unlocked-v1')
             || sessionStorage.getItem('notes-gate-unlocked-v1');
      if (raw) {
        var d = JSON.parse(raw);
        if (d && d.ts && (Date.now() - d.ts) < ((d.days || 7) * 86400000)) return;
      }
    } catch (e) {}
    var here = location.pathname.split('/').pop() + location.search + location.hash;
    location.replace('login.html?returnTo=' + encodeURIComponent(here || 'index.html'));
  })();
  </script>
  <title>知识库 · 袁修玮</title>
