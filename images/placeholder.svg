<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#2a2e36" stroke-width="1"/>
    </pattern>
    <pattern id="gridFine" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0L0 0 0 8" fill="none" stroke="#1f2228" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#gridFine)"/>
  <rect width="800" height="600" fill="url(#grid)"/>
  <g transform="translate(400 300)" fill="none" stroke="#ff6a00" stroke-width="1.5" opacity="0.55">
    <circle r="140"/>
    <circle r="90"/>
    <circle r="40"/>
    <line x1="-180" y1="0" x2="180" y2="0"/>
    <line x1="0" y1="-180" x2="0" y2="180"/>
    <line x1="-127" y1="-127" x2="127" y2="127"/>
    <line x1="-127" y1="127" x2="127" y2="-127"/>
  </g>
  <g fill="#3a3f48" font-family="monospace" font-size="11" letter-spacing="1.5">
    <text x="24" y="32">SYS://PLACEHOLDER</text>
    <text x="24" y="52" opacity="0.6">REPLACE_WITH_IMAGE</text>
    <text x="776" y="32" text-anchor="end">800x600</text>
    <text x="776" y="568" text-anchor="end" opacity="0.6">images/placeholder.svg</text>
  </g>
  <text x="400" y="560" text-anchor="middle" fill="#666" font-family="monospace" font-size="13" letter-spacing="3" font-weight="600">IMAGE / 图像占位</text>
</svg>
